<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FlexiAuto — Mon espace élève</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Inter',system-ui,-apple-system,sans-serif;color:#17324d;background:#f4fbff;
    -webkit-font-smoothing:antialiased;line-height:1.5;min-height:100vh;}
  a{color:inherit;text-decoration:none}
  :root{--blue:#1976d2;--blue-deep:#0d5fb3;--sage:#6fbf73;--ink:#17324d;--muted-strong:#5f7588;--bord:#E7ECF7;}

  .promo{background:linear-gradient(180deg,#2158E6,#1B4FD8);color:#fff;display:flex;align-items:center;justify-content:center;gap:10px;padding:7px 16px;font-size:12px;font-weight:500;box-shadow:0 1px 2px rgba(15,23,42,.2);}
  .promo .btn-essai{background:rgba(255,255,255,.9);color:#1B4FD8;font-weight:600;font-size:11px;padding:3px 12px;border-radius:12px;white-space:nowrap;}
  .promo .close{width:18px;height:18px;border-radius:50%;background:rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;font-size:10px;line-height:1;cursor:pointer;border:none;color:#fff;flex-shrink:0}
  #header{padding:0 28px;height:62px;display:flex;align-items:center;gap:18px;background:linear-gradient(180deg,rgba(244,251,255,.96) 0%,rgba(244,251,255,.78) 64%,rgba(244,251,255,0) 100%);}
  .logo{display:flex;align-items:center;flex-shrink:0;cursor:pointer;text-decoration:none}
  .logo-img{height:38px;width:auto;display:block}

  main{display:flex;align-items:center;justify-content:center;padding:60px 20px;min-height:60vh}
  .dash-card{
    width:100%;max-width:440px;background:#fff;border-radius:20px;padding:40px 32px;text-align:center;
    box-shadow:0 18px 46px rgba(31,86,125,.16),0 2px 10px rgba(31,86,125,.08);
    border:1px solid var(--bord);
  }
  .dash-card .ico{width:64px;height:64px;border-radius:50%;background:rgba(111,191,115,.12);color:var(--sage);
    display:flex;align-items:center;justify-content:center;font-size:30px;margin:0 auto 18px}
  .dash-card h1{font-size:22px;font-weight:800;letter-spacing:-0.02em;color:var(--ink)}
  .dash-card p{font-size:14px;color:var(--muted-strong);margin-top:12px;line-height:1.6}
  .btn-logout{
    margin-top:26px;display:inline-flex;align-items:center;justify-content:center;
    height:42px;padding:0 24px;border-radius:100px;border:1px solid rgba(25,118,210,.2);
    background:#fff;color:var(--blue);font-family:'Inter',sans-serif;font-size:13.5px;font-weight:700;
    cursor:pointer;transition:all .2s;
  }
  .btn-logout:hover{background:#EEF3FE;border-color:rgba(25,118,210,.35)}

  .reminder-banner{
    max-width:600px;margin:20px auto 0;display:none;align-items:center;justify-content:space-between;
    gap:12px;background:#EEF3FF;color:#1B4FD8;border-radius:8px;padding:12px 18px;font-size:13.5px;font-weight:600;
  }
  .reminder-btn{
    background:#1B4FD8;color:#fff;font-size:12.5px;font-weight:700;padding:8px 16px;border-radius:100px;
    white-space:nowrap;transition:filter .15s;flex-shrink:0;
  }
  .reminder-btn:hover{filter:brightness(1.1)}
  @media (max-width:640px){
    .reminder-banner{flex-direction:column;align-items:flex-start;margin:16px 16px 0}
  }
</style>
</head>
<body>
  <div class="promo" id="cdr-de-banner">
    <span>🎯 Code de la route — Questions officielles · Moins cher que la concurrence</span>
    <a href="#" class="btn-essai" onclick="alert('Code de la route — bientôt disponible !');return false;">Essayer gratuit</a>
    <button class="close" aria-label="Fermer" onclick="this.closest('.promo').style.display='none';localStorage.setItem('cdr-de-closed','true');">✕</button>
  </div>
  <div class="topbar-wrap">
    <div id="header">
      <a class="logo" href="index.html">
        <img src="logo-flexiauto.png" alt="FlexiAuto" class="logo-img">
      </a>
    </div>
  </div>

  <div class="reminder-banner" id="reminder-banner">
    <span>👋 Tu n'as pas encore choisi ton auto-école</span>
    <a href="index.html" class="reminder-btn">Choisir maintenant</a>
  </div>

  <main>
    <div class="dash-card" id="dash-card" style="display:none">
      <div class="ico">🎓</div>
      <h1 id="dash-title">Bienvenue !</h1>
      <p>Ton espace d'entraînement au code arrive bientôt.</p>
      <button class="btn-logout" id="btn-logout">Se déconnecter</button>
    </div>
  </main>

  <script>
    (function(){
      if(localStorage.getItem('cdr-de-closed') === 'true'){
        var banner = document.getElementById('cdr-de-banner');
        if(banner) banner.style.display = 'none';
      }
    })();

    var SUPABASE_URL = "https://nlzplxhetonxvcdckmcq.supabase.co";
    var SUPABASE_ANON_KEY = "sb_publishable_er7mVFa1fYYWLwGFCacZ8Q_JWX_uyCF";
    var supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // Garde d'accès : session requise + rôle 'eleve' requis, sinon redirection.
    supabaseClient.auth.getSession().then(function(sessionRes){
      var session = sessionRes.data.session;
      if (!session) {
        window.location.href = 'connexion.html';
        return;
      }

      supabaseClient.from('profiles').select('role, prenom, ecole_id').eq('id', session.user.id).single()
        .then(function(profileRes){
          if (profileRes.error || !profileRes.data) {
            window.location.href = 'connexion.html';
            return;
          }

          if (profileRes.data.role === 'admin') {
            window.location.href = 'dashboard-admin.html';
            return;
          }
          if (profileRes.data.role === 'auto_ecole' || profileRes.data.role === 'moniteur') {
            window.location.href = 'dashboard-auto-ecole.html';
            return;
          }
          if (profileRes.data.role !== 'eleve') {
            window.location.href = 'connexion.html';
            return;
          }

          var prenom = profileRes.data.prenom;
          document.getElementById('dash-title').textContent = prenom ? 'Bienvenue ' + prenom + ' !' : 'Bienvenue !';
          document.getElementById('dash-card').style.display = 'block';

          if (!profileRes.data.ecole_id) {
            document.getElementById('reminder-banner').style.display = 'flex';
          }
        });
    });

    document.getElementById('btn-logout').addEventListener('click', function(){
      supabaseClient.auth.signOut().then(function(){
        window.location.href = 'index.html';
      });
    });
  </script>
</body>
</html>
