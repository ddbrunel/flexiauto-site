<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inscription — FlexiAuto</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;background:#fff;color:#0F172A;min-height:100vh;display:flex;flex-direction:column}
.topbanner{position:relative;background:#1B4FD8;padding:6px 16px;display:none;align-items:center;justify-content:center;gap:10px;color:#fff;font-size:12px}
.topbanner-cta{background:rgba(255,255,255,0.15);color:#fff;border:none;border-radius:12px;padding:2px 10px;font-size:11px;cursor:pointer;font-family:'Inter',sans-serif}
.topbanner-cta:hover{background:rgba(255,255,255,0.25)}
.topbanner-close{position:absolute;right:16px;top:50%;transform:translateY(-50%);width:16px;height:16px;border-radius:50%;background:rgba(255,255,255,0.15);display:flex;align-items:center;justify-content:center;font-size:10px;line-height:1;color:#fff;cursor:pointer}
.topbanner-close:hover{background:rgba(255,255,255,0.28)}
#header{height:62px;padding:0 28px;display:flex;align-items:center;gap:9px;border-bottom:1px solid #F0F2F5}
.logo{display:flex;align-items:center;gap:9px;font-weight:600;font-size:19px;color:#0F172A;text-decoration:none}
.logo-icon{width:28px;height:28px;background:#1B4FD8;border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.logo-icon svg{width:15px;height:15px;fill:#fff}
.h-btn-info{display:flex;align-items:center;gap:4px;height:34px;padding:0 12px;border-radius:8px;font-size:13px;color:#374151;background:transparent;border:none;cursor:pointer;font-family:'Inter',sans-serif}
.h-btn-info:hover{background:rgba(0,0,0,0.05)}
.h-btn-info .chevron{font-size:10px;color:#9ca3af}
.btn-connect{height:34px;padding:0 18px;background:#1B4FD8;color:#fff;border:none;border-radius:100px;font-family:'Inter',sans-serif;font-size:13px;font-weight:500;cursor:pointer;margin-left:8px}
.btn-connect:hover{background:#1640b0}
main{flex:1;display:flex;align-items:center;justify-content:center;padding:24px}
.msg{text-align:center;max-width:420px}
.msg-title{font-size:20px;font-weight:600;color:#0F172A;margin-bottom:28px}
.btn-back{display:inline-flex;align-items:center;justify-content:center;height:38px;padding:0 22px;background:#1B4FD8;color:#fff;border:none;border-radius:20px;font-family:'Inter',sans-serif;font-size:13px;font-weight:500;cursor:pointer;text-decoration:none}
.btn-back:hover{background:#1640b0}
</style>
</head>
<body>
<div class="topbanner" id="topbanner">
  <span>📚 Code de la route · Questions officielles</span>
  <button class="topbanner-cta" onclick="alert('Code de la route — bientôt disponible !')">Essai gratuit →</button>
  <div class="topbanner-close" onclick="dismissTopBanner()">✕</div>
</div>
<div id="header">
  <a class="logo" href="index.html">
    <div class="logo-icon"><svg viewBox="0 0 24 24"><path d="M18.92 6.01C18.72 5.42 18.16 5 17.5 5h-11c-.66 0-1.21.42-1.42 1.01L3 12v8c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-1h12v1c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-8l-2.08-5.99zM6.5 16c-.83 0-1.5-.67-1.5-1.5S5.67 13 6.5 13s1.5.67 1.5 1.5S7.33 16 6.5 16zm11 0c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zM5 11l1.5-4.5h11L19 11H5z"/></svg></div>
    FlexiAuto
  </a>
  <div style="flex:1"></div>
  <button class="h-btn-info" onclick="window.location.href='savoir-plus.html'">En savoir plus <span class="chevron">▾</span></button>
  <button class="btn-connect" onclick="window.location.href='https://flexi-app-peach.vercel.app/login'">Se connecter</button>
</div>
<main>
  <div class="msg">
    <div class="msg-title">Inscription — Fonctionnalité bientôt disponible</div>
    <a class="btn-back" href="index.html">Retour à la liste</a>
  </div>
</main>
<script>
function dismissTopBanner(){
  document.getElementById('topbanner').style.display = 'none';
  localStorage.setItem('fa_topbanner_dismissed', '1');
}
if(!localStorage.getItem('fa_topbanner_dismissed')){
  document.getElementById('topbanner').style.display = 'flex';
}
</script>
</body>
</html>
