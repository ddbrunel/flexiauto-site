name: Scraping mensuel Google Places

on:
  schedule:
    - cron: '0 3 1 * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installer dépendances
        run: pip install requests

      - name: Lancer le scrapping
        env:
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          GOOGLE_KEY: ${{ secrets.GOOGLE_KEY }}
        run: python scrape_monthly.py
